name: Update BEEV Data

on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch BEEV data
        run: node scripts/fetch-beev.mjs

      - name: Process BEEV data into beev.db.json
        run: node scripts/process-beev.mjs

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/beev.db.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update BEEV data $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
